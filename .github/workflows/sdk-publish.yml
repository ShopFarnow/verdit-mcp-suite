# ════════════════════════════════════════════════════════════════════════════
# sdk-publish.yml — Publish @verditnxtgen/mcp-middleware (npm) and
#                   verditnxtgen-mcp (PyPI) using registry API tokens.
#
# Required GitHub Secrets (tokens, NOT passwords):
#   NPM_TOKEN  — npmjs.com → Account Settings → Access Tokens → Generate → Publish
#   PYPI_TOKEN — pypi.org → Account Settings → API tokens → Add API token
# ════════════════════════════════════════════════════════════════════════════

name: SDK Publish — npm + PyPI

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to publish"
        required: true
        default: "both"
        type: choice
        options: [both, npm, pypi]
      dry_run:
        description: "Dry run — build but do not publish (set false for release)"
        required: false
        default: "false"   # MP-02: un-deferred — ready for real publish
        type: choice
        options: ["true", "false"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-npm:
    name: Publish TypeScript SDK → npm
    runs-on: ubuntu-latest
    if: inputs.package == 'both' || inputs.package == 'npm'

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ShopFarnow/verdit-mcp-suite
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Check npm version not already published
        working-directory: ts-middleware
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          PKG_NAME=$(node -p "require('./package.json').name")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "::warning::${PKG_NAME}@${PKG_VERSION} already published — bump version before re-running"
            echo "SKIP_NPM=true" >> $GITHUB_ENV
          else
            echo "SKIP_NPM=false" >> $GITHUB_ENV
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install TypeScript compiler
        if: env.SKIP_NPM != 'true'
        working-directory: ts-middleware
        run: npm install

      - name: Verify canonical JSON key sort (SK-05)
        if: env.SKIP_NPM != 'true'
        working-directory: ts-middleware
        run: |
          # SK-05: verify TypeScript SDK signs payloads with sorted keys
          node -e "
          const fs = require('fs');
          const src = fs.existsSync('dist/index.js') ? fs.readFileSync('dist/index.js','utf8') : '';
          if (src.includes('Object.keys') && src.includes('sort')) {
            console.log('✅ Key sorting detected in SDK output');
          } else if (fs.existsSync('src/index.ts')) {
            const ts = fs.readFileSync('src/index.ts','utf8');
            if (ts.includes('.sort()') || ts.includes('Object.keys(')) {
              console.log('✅ Key sorting in TypeScript source');
            } else {
              console.warn('::warning::SK-05: No key sorting detected — HMAC verification may fail on backend');
            }
          } else {
            console.warn('::warning::SK-05: Could not verify key sorting');
          }
          "

      - name: Build TypeScript
        if: env.SKIP_NPM != 'true'
        working-directory: ts-middleware
        run: npx tsc

      - name: Publish to npm (dry run)
        if: inputs.dry_run == 'true'
        working-directory: ts-middleware
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm identity
        if: inputs.dry_run == 'false'
        working-directory: ts-middleware
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: inputs.dry_run == 'false'
        working-directory: ts-middleware
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish Python SDK → PyPI
    runs-on: ubuntu-latest
    if: inputs.package == 'both' || inputs.package == 'pypi'

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ShopFarnow/verdit-mcp-suite
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Check PyPI version not already published
        working-directory: python-middleware
        run: |
          PKG_VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          PKG_NAME=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['name'])")
          if pip index versions "${PKG_NAME}" 2>/dev/null | grep -q "${PKG_VERSION}"; then
            echo "::warning::${PKG_NAME}==${PKG_VERSION} already on PyPI — bump version"
            echo "SKIP_PYPI=true" >> $GITHUB_ENV
          else
            echo "SKIP_PYPI=false" >> $GITHUB_ENV
          fi

      - name: Build wheel + sdist
        if: env.SKIP_PYPI != 'true'
        working-directory: python-middleware
        run: python -m build

      - name: Check package (dry run)
        if: inputs.dry_run == 'true'
        working-directory: python-middleware
        run: twine check dist/*

      - name: Upload to PyPI
        if: inputs.dry_run == 'false'
        working-directory: python-middleware
        run: twine upload dist/* --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

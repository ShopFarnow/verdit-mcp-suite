name: Setup Infrastructure - Create R2 Bucket

on:
  workflow_dispatch: # This allows you to trigger it manually from a button

jobs:
  create-r2-bucket:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Cloudflare Wrangler
        run: npm install -g wrangler

      - name: Execute Bash Command to Create Bucket
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Running R2 bucket creation..."
          wrangler r2 bucket create verditnxtgen-audit-logs
          echo "Bucket creation command executed!"
